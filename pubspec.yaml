name: wrapd
description: WRAPD — The Professional Recording Instrument.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  provider: ^6.1.1
  intl: ^0.19.0
  uuid: ^4.3.3
  record: ^5.0.0
  ffmpeg_kit_flutter_audio: ^6.0.3
  path_provider: ^2.1.2
  just_audio: ^0.9.36
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  file_picker: ^6.1.1
  speech_to_text: ^7.0.1
  permission_handler: ^11.3.2
  connectivity_plus: ^5.0.1
  logger: ^2.0.2
  supabase_flutter: ^2.12.0
  go_router: ^13.0.0
  share_plus: ^12.0.1
  http: ^1.2.0
  flutter_gemma: ^0.4.0   # On-device AI — Gemma 3 270M, no cloud needed

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true
